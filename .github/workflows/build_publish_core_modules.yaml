name: Docker Image CI for GHCR
on: 
  push:
    branches: ['main']
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GH_USERNAME }}
          password: ${{ secrets.GH_TOKEN }}
      
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./core-ledger
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/openreserveio/core-ledger:latest
          file: ./core-ledger/application/coreledger/docker/Dockerfile

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./core-ledger-poster
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/openreserveio/core-ledger-poster:latest
          file: ./core-ledger-poster/application/coreledgerposter/docker/Dockerfile

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./core-gl
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/openreserveio/core-gl:latest
          file: ./core-gl/application/coregl/docker/Dockerfile

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./core-payments
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/openreserveio/core-payments:latest
          file: ./core-payments/application/corepayments/docker/Dockerfile

      
